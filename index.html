      "透過圖形結構完全取代大型語言模型的推理，讓代理只依靠圖演算法完成任務",
      "僅用於保存代理的輸出結果，方便後續檢視與審計，而不影響實際推理流程",
      "將代理限制在既定流程內，避免其產生偏離設計腳本的行為",
      "作為代理在執行過程中的參考框架，用於組織決策步驟並支援任務推理"
    ],
    "answer": 3,
    "explanation": "Solution Graph 是代理執行任務時的決策參考框架，可協助規劃步驟與支援推理。"
  },
  {
    "id": 100,
    "question_no": 50,
    "question": "小明想開發一個部落格寫作工具，讓用戶輸入文章開頭後，系統自動幫忙寫出後續內容，例如輸入「今天去了台北木柵動物園...」，系統就能續寫。若要實現這樣的功能，最適合選擇下列哪一類任務？",
    "category_level1": "L12",
    "category_level1_name": "生成式AI應用與規劃",
    "category_level2": "L122",
    "category_level2_name": "生成式AI應用領域與工具使用",
    "category_level3": "L12201",
    "category_level3_name": "生成式AI應用領域與常見工具",
    "keywords": [
      "生成式AI"
    ],
    "difficulty": "easy",
    "options": [
      "序列到序列建模（Sequence-to-Sequence Modeling），透過輸入序列產生新的輸出序列",
      "遮罩語言建模（Masked Language Modeling），補齊文字中缺失的詞語或片段",
      "生成式語言建模（Text Generation），依據上下文持續產生新的內容",
      "文本分類（Text Classification），針對輸入文本判斷情感、主題或標籤"
    ],
    "answer": 2,
    "explanation": "依據開頭續寫後文屬於文字生成任務，重點是根據上下文持續產生新內容。"
  }
];
        }

        let state = {
            questions: [],
            currentIdx: 0,
            score: 0,
            isAnswered: false,
            filterLevel: 'level2' // 預設依主題分類
        };

        // 欄位對應表
        const fieldMap = {
            'level1': { id: 'category_level1', name: 'category_level1_name' },
            'level2': { id: 'category_level2', name: 'category_level2_name' },
            'level3': { id: 'category_level3', name: 'category_level3_name' }
        };

        function hideAll() {
            document.getElementById('main-menu').classList.add('hidden');
            document.getElementById('filter-menu').classList.add('hidden');
            document.getElementById('quiz-container').classList.add('hidden');
            document.getElementById('result-page').classList.add('hidden');
        }

        function showMainMenu() {
            hideAll();
            document.getElementById('main-menu').classList.remove('hidden');
            document.getElementById('nav-info').innerText = "系統首頁";
        }

        function showFilterMenu() {
            hideAll();
            document.getElementById('filter-menu').classList.remove('hidden');
            changeFilterLevel(state.filterLevel);
        }

        function changeFilterLevel(levelKey) {
            state.filterLevel = levelKey;
            document.querySelectorAll('.level-btn').forEach(btn => {
                btn.classList.remove('bg-blue-600', 'text-white');
                btn.classList.add('bg-slate-100', 'text-slate-600');
            });
            
            const activeBtn = document.getElementById(`btn-${levelKey}`);
            if (activeBtn) {
                activeBtn.classList.remove('bg-slate-100', 'text-slate-600');
                activeBtn.classList.add('bg-blue-600', 'text-white');
            }

            renderFilterList();
        }

        function renderFilterList() {
            const container = document.getElementById('list-container');
            const map = fieldMap[state.filterLevel];
            
            // 提取所有唯一組合並格式化
            const itemMap = new Map();
            quizData.forEach(q => {
                const id = q[map.id];
                const name = q[map.name];
                if (id && name) {
                    const fullName = `${id} ${name}`;
                    itemMap.set(fullName, (itemMap.get(fullName) || 0) + 1);
                }
            });

            const sortedItems = Array.from(itemMap.keys()).sort();

            if (sortedItems.length === 0) {
                container.innerHTML = `<div class="text-center py-10 text-slate-400 italic">尚未載入題庫資料。</div>`;
                return;
            }

            container.innerHTML = sortedItems.map(displayName => {
                const count = itemMap.get(displayName);
                // 為了過濾，我們需要分離出原始的 name
                const originalName = displayName.split(' ').slice(1).join(' ');
                
                return `
                    <button onclick="startQuizByFilter('${map.name}', '${originalName.replace(/'/g, "\\'")}')" class="w-full flex justify-between items-center p-4 bg-slate-50 hover:bg-white border border-transparent hover:border-blue-200 rounded-xl transition-all group shadow-sm mb-2">
                        <span class="font-medium text-slate-700 text-left">${displayName}</span>
                        <span class="ml-2 whitespace-nowrap bg-slate-200 text-slate-500 text-xs px-2 py-1 rounded-full group-hover:bg-blue-100 group-hover:text-blue-600">${count} 題</span>
                    </button>
                `;
            }).join('');
        }

        function startRandomQuiz() {
            state.questions = [...quizData].sort(() => Math.random() - 0.5).slice(0, 10);
            initQuiz("隨機綜合練習");
        }

        function startQuizByFilter(fieldName, value) {
            state.questions = quizData.filter(q => q[fieldName] === value);
            initQuiz(value);
        }

        function initQuiz(title) {
            hideAll();
            state.currentIdx = 0;
            state.score = 0;
            document.getElementById('quiz-container').classList.remove('hidden');
            document.getElementById('current-label').innerText = title;
            document.getElementById('nav-info').innerText = "練習中";
            renderQuestion();
        }

        function renderQuestion() {
            state.isAnswered = false;
            const q = state.questions[state.currentIdx];
            const total = state.questions.length;

            document.getElementById('progress-text').innerText = `${state.currentIdx + 1} / ${total}`;
            document.getElementById('progress-bar').style.width = `${(state.currentIdx / total) * 100}%`;
            document.getElementById('question-text').innerText = q.question;
            document.getElementById('explanations').classList.add('hidden');
            document.getElementById('next-btn').classList.add('hidden');

            const grid = document.getElementById('options-grid');
            grid.innerHTML = q.options.map((opt, i) => `
                <button onclick="handleAnswer(${i}, this)" class="option-btn w-full p-4 border-2 border-slate-100 rounded-xl text-left hover:border-blue-200 hover:bg-blue-50 transition-all flex items-start">
                    <span class="font-bold mr-4 text-slate-400 shrink-0">${String.fromCharCode(65+i)}</span>
                    <span class="text-slate-700 font-medium">${opt}</span>
                </button>
            `).join('');
        }

        function handleAnswer(idx, el) {
            if (state.isAnswered) return;
            state.isAnswered = true;

            const q = state.questions[state.currentIdx];
            const buttons = document.querySelectorAll('.option-btn');
            
            if (idx === q.answer) {
                el.classList.add('correct');
                state.score++;
            } else {
                el.classList.add('incorrect');
                buttons[q.answer].classList.add('correct');
            }

            document.getElementById('explanation-content').innerText = q.explanation || "無解析資料。";
            document.getElementById('explanations').classList.remove('hidden');
            document.getElementById('next-btn').classList.remove('hidden');
            
            const total = state.questions.length;
            document.getElementById('progress-bar').style.width = `${((state.currentIdx + 1) / total) * 100}%`;
        }

        function handleNext() {
            state.currentIdx++;
            if (state.currentIdx < state.questions.length) {
                renderQuestion();
            } else {
                hideAll();
                document.getElementById('result-page').classList.remove('hidden');
                document.getElementById('final-score').innerText = `${state.score} / ${state.questions.length}`;
                document.getElementById('nav-info').innerText = "結算中";
            }
        }

        window.onload = showMainMenu;
    </script>
</body>
</html>
