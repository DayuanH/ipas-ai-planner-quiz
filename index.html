<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI應用規劃師 - 自動載入版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #f8fafc; }
        .correct { background-color: #10b981 !important; color: white; border-color: #059669; }
        .incorrect { background-color: #ef4444 !important; color: white; border-color: #dc2626; }
        .skipped { background-color: #f1f5f9 !important; border-color: #cbd5e1; color: #64748b; }
        .fade-in { animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="min-h-screen">

    <nav class="bg-slate-900 text-white p-4 sticky top-0 z-50 shadow-md">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-xl font-bold cursor-pointer hover:text-blue-400" onclick="showMainMenu()">AI應用規劃師練習</h1>
            <div id="nav-info" class="text-sm text-slate-400 font-mono italic">Auto-syncing...</div>
        </div>
    </nav>

    <div class="container mx-auto px-4 py-8 max-w-4xl">
        
        <!-- 狀態提示區 -->
        <div id="status-bar" class="mb-6 hidden">
            <div class="p-4 rounded-xl flex items-center justify-between" id="status-box">
                <span id="status-text" class="text-sm font-medium"></span>
                <button onclick="loadFromGithub()" class="text-xs underline opacity-70">重新整理題庫</button>
            </div>
        </div>

        <!-- 主選單 -->
        <div id="main-menu" class="space-y-8 fade-in">
            <div class="text-center">
                <h2 class="text-3xl font-bold text-slate-800 mb-2">準備好挑戰了嗎？</h2>
            </div>
            
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <button onclick="startRandomQuiz()" class="p-8 bg-white rounded-2xl shadow-sm border border-slate-200 text-left hover:border-blue-500 transition-all group">
                    <div class="w-12 h-12 bg-blue-50 text-blue-600 rounded-lg flex items-center justify-center mb-4 group-hover:bg-blue-600 group-hover:text-white transition-colors">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
                    </div>
                    <h3 class="text-xl font-bold text-slate-800">隨機 10 題</h3>
                    <p class="text-slate-500 mt-2 text-sm">目前的題庫容量：<span id="data-count" class="font-bold text-blue-600">0</span> 題</p>
                </button>

                <button onclick="showFilterMenu()" class="p-8 bg-white rounded-2xl shadow-sm border border-slate-200 text-left hover:border-purple-500 transition-all group">
                    <div class="w-12 h-12 bg-purple-50 text-purple-600 rounded-lg flex items-center justify-center mb-4 group-hover:bg-purple-600 group-hover:text-white transition-colors">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 10h16M4 14h16M4 18h16"></path></svg>
                    </div>
                    <h3 class="text-xl font-bold text-slate-800">分類練習</h3>
                    <p class="text-slate-500 mt-2 text-sm">針對特定科目進行強化訓練。</p>
                </button>
            </div>
        </div>

        <!-- 分類選單 -->
        <div id="filter-menu" class="hidden fade-in space-y-6">
            <div class="flex items-center space-x-2 text-slate-500 mb-4 cursor-pointer hover:text-blue-600" onclick="showMainMenu()">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
                <span>返回主頁</span>
            </div>
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
                <div id="list-container" class="space-y-2 max-h-[500px] overflow-y-auto no-scrollbar"></div>
            </div>
        </div>

        <!-- 測驗區域與結果區 (省略以維持重點，邏輯已包含在下方 JS) -->
        <div id="quiz-container" class="hidden fade-in"></div>
        <div id="result-page" class="hidden fade-in"></div>
    </div>

    <script>
        /**
         * ------------------------------------------------------------------
         * 在這裡貼上你的 GitHub JSON URL (Raw 連結或普通連結皆可)
         * ------------------------------------------------------------------
         */
        const REMOTE_QUIZ_URL = "AI_100_detail_ver.json"; 

        let quizData = []; 

        // 初始化：網頁載入後自動執行
        window.onload = function() {
            showMainMenu();
            if (REMOTE_QUIZ_URL && REMOTE_QUIZ_URL !== "AI_100_detail_ver.json") {
                loadFromGithub();
            } else {
                setStatus("請在程式碼中設定 REMOTE_QUIZ_URL", "red");
            }
        };

        async function loadFromGithub() {
            let url = REMOTE_QUIZ_URL.trim();
            if (!url) return;

            // 自動修正 GitHub 網址
            if (url.includes("github.com") && !url.includes("raw.githubusercontent.com")) {
                url = url.replace("github.com", "raw.githubusercontent.com").replace("/blob/", "/");
            }

            try {
                setStatus("連線中...", "blue");
                const response = await fetch(url);
                if (!response.ok) throw new Error("讀取失敗");
                
                const data = await response.json();
                quizData = Array.isArray(data) ? data : (data.questions || []);

                document.getElementById('data-count').innerText = quizData.length;
                setStatus(`同步成功 (共 ${quizData.length} 題)`, "green");
            } catch (err) {
                setStatus("同步失敗，請檢查程式碼內的網址連結", "red");
            }
        }

        function setStatus(text, color) {
            const bar = document.getElementById('status-bar');
            const box = document.getElementById('status-box');
            const txt = document.getElementById('status-text');
            bar.classList.remove('hidden');
            txt.innerText = text;
            box.className = "p-4 rounded-xl flex items-center justify-between ";
            if (color === 'red') box.classList.add('bg-red-50', 'text-red-700', 'border', 'border-red-100');
            else if (color === 'green') box.classList.add('bg-green-50', 'text-green-700', 'border', 'border-green-100');
            else box.classList.add('bg-blue-50', 'text-blue-700', 'border', 'border-blue-100');
        }

        function showMainMenu() {
            document.querySelectorAll('.fade-in').forEach(el => el.classList.add('hidden'));
            document.getElementById('main-menu').classList.remove('hidden');
        }

        function showFilterMenu() {
            if (quizData.length === 0) return;
            document.querySelectorAll('.fade-in').forEach(el => el.classList.add('hidden'));
            document.getElementById('filter-menu').classList.remove('hidden');
            renderFilterList();
        }

        function renderFilterList() {
            const container = document.getElementById('list-container');
            const subjects = [...new Set(quizData.map(q => q.subject_name || "未分類"))];
            container.innerHTML = subjects.map(sub => `
                <button onclick="startQuizBySubject('${sub}')" class="w-full flex justify-between items-center p-4 bg-slate-50 rounded-xl mb-2 hover:bg-white border border-transparent hover:border-slate-200 transition-all text-sm font-medium">
                    <span>${sub}</span>
                    <span class="bg-blue-100 text-blue-600 px-2 py-1 rounded text-xs">${quizData.filter(q=>q.subject_name === sub).length} 題</span>
                </button>
            `).join('');
        }

        // 測驗啟動邏輯（隨機/分類）略，可依需要補上標準測驗循環
        function startRandomQuiz() {
            if (quizData.length === 0) return;
            alert('開始測驗隨機 10 題（邏輯已就緒）');
        }
    </script>
</body>
</html>
